<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Provider Demo</title>
  <style>
    :root { color-scheme: dark; --bg: #0f172a; --card: rgba(15, 23, 42, 0.92); --line: rgba(255,255,255,0.12); --text: #f8fafc; --muted: #cbd5e1; --accent: #38bdf8; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }
    body { display: grid; place-items: center; padding: 18px; background: linear-gradient(135deg, #020617, #0f172a 55%, #1e293b); color: var(--text); }
    .card { width: min(100%, 520px); background: var(--card); border: 1px solid var(--line); border-radius: 22px; padding: 24px; box-shadow: 0 24px 70px rgba(0,0,0,0.35); }
    .pill { display: inline-block; padding: 7px 12px; border-radius: 999px; background: rgba(56,189,248,0.12); border: 1px solid rgba(56,189,248,0.24); color: #dbeafe; font-size: 13px; }
    h1 { margin: 14px 0 8px; font-size: clamp(1.8rem, 4vw, 2.8rem); }
    p { color: var(--muted); line-height: 1.6; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 18px; }
    .btn { display: inline-flex; align-items: center; justify-content: center; border: 0; border-radius: 12px; padding: 10px 14px; text-decoration: none; font: inherit; font-weight: 700; cursor: pointer; }
    .primary { background: var(--accent); color: #08111f; }
    .secondary { background: rgba(255,255,255,0.12); color: var(--text); }
    .log { margin-top: 16px; padding: 12px 14px; border-radius: 12px; background: rgba(2,6,23,0.7); border: 1px solid rgba(255,255,255,0.1); color: #d1fae5; white-space: pre-wrap; min-height: 44px; }
    textarea { width: 100%; min-height: 110px; margin-top: 12px; resize: vertical; border-radius: 14px; border: 1px solid rgba(255,255,255,0.15); background: rgba(2, 6, 23, 0.65); color: var(--text); padding: 12px 14px; font: inherit; }
    textarea:focus { outline: none; border-color: rgba(56,189,248,0.6); box-shadow: 0 0 0 3px rgba(56,189,248,0.16); }
  </style>
</head>
<body>
  <main class="card">
    <div class="pill" id="providerPill">Local provider demo</div>
    <h1 id="title">Provider demo</h1>
    <p>
      This page is a harmless local stand-in for a provider landing page. It does not accept passwords or OTPs.
    </p>
    <label for="notes" style="display:block;margin-top:14px;font-weight:700;">What do you love about us?</label>
    <textarea id="notes" placeholder="Type a test response here..."></textarea>
    <div class="row">
      <button class="btn primary" id="saveBtn" type="button">Save note</button>
      <a class="btn secondary" href="./local-demo.html">Back to demo</a>
    </div>
    <div class="log" id="log">No note saved yet.</div>
  </main>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const provider = (params.get('provider') || 'demo').toLowerCase();
      const names = {
        outlook: 'Outlook',
        office365: 'Office 365',
        yahoo: 'Yahoo Mail',
        aol: 'AOL',
        other: 'Other Mail',
        demo: 'Demo'
      };
      const providerName = names[provider] || 'Demo';
      const title = document.getElementById('title');
      const providerPill = document.getElementById('providerPill');
      const notes = document.getElementById('notes');
      const saveBtn = document.getElementById('saveBtn');
      const log = document.getElementById('log');

      title.textContent = `${providerName} demo`;
      providerPill.textContent = `${providerName} local page`;

      const storageKey = `paperless_demo_note_${provider}`;
      const saved = sessionStorage.getItem(storageKey);
      if (saved) {
        notes.value = saved;
        log.textContent = `Saved note for ${providerName}:\n${saved}`;
      }

      saveBtn.addEventListener('click', function () {
        const value = notes.value.trim();
        sessionStorage.setItem(storageKey, value);
        console.log(`[${providerName}] demo note saved:`, value);
        log.textContent = value ? `Saved note for ${providerName}:\n${value}` : `Saved an empty note for ${providerName}.`;
      });
    })();
  </script>
</body>
</html>
